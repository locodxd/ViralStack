version: "3.8"

services:
  viralstack:
    build: .
    container_name: viralstack
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist database, cookies, output videos, music
      - ./storage:/app/storage
      - ./music:/app/music
      - ./.env:/app/.env:ro
      - ./config/service_account.json:/app/config/service_account.json:ro
    environment:
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
