version: "3.8"

services:
  viralstack:
    build: .
    container_name: viralstack
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist database, cookies, output videos, music
      - ./storage:/app/storage
      - ./music:/app/music
      - ./.env:/app/.env:ro
      - ./config/service_account.json:/app/config/service_account.json:ro
    environment:
      - TZ=America/New_York
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
