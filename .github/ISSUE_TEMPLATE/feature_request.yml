name: Feature request
description: Sugerir una nueva funcionalidad
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Qué problema resuelve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Propuesta concreta
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas que consideraste
